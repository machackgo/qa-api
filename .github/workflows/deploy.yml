name: Deploy qa-api to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VM_PORT }} ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on VM
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VM_PORT }} ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            set -e
            cd ~/cs3/qa-api
            git pull origin main

            docker stop qa-api-backend qa-api-frontend || true
            docker rm qa-api-backend qa-api-frontend || true

            docker build -f backend/Dockerfile -t qa-api-backend .
            docker build -f frontend/Dockerfile -t qa-api-frontend .

            docker run -d --name qa-api-backend -p 22014:9004 qa-api-backend
            docker run -d --name qa-api-frontend -p 22004:7004 qa-api-frontend
          EOF  
